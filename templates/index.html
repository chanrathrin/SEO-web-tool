<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SEO Tool + Together AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-window">
    <div class="outer-shell">
      <div class="top-actions">
        <div class="api-info-wrap">
          <div class="api-info" id="apiInfo">API: not configured</div>
        </div>

        <div class="top-right">
          <input id="apiKey" class="api-key-input" type="password" placeholder="Paste Together API key here">
        </div>
      </div>

      <div class="main-scroll">
        <div class="section-title">All in One Tools</div>

        <section class="article-tool">
          <div class="article-header">
            <h1>Article SEO + WordPress Tool</h1>
            <p>Generate clean article structure and WordPress-ready HTML.</p>
          </div>

          <div class="article-content-grid">
            <div class="panel panel-left">
              <div class="panel-title">Input Article</div>
              <div class="panel-subtitle">Paste news link or paste full article text</div>

              <input
                id="articleUrl"
                class="field-input"
                type="text"
                placeholder="Paste news URL here..."
                autocomplete="off"
              >

              <div class="tools-card">
                <div class="tools-row">
                  <button id="generateBtn" class="app-btn yellow-btn">Generate News Format</button>
                  <button id="clearBtn" class="app-btn red-btn">Clear Input</button>
                  <button id="copyHtmlBtn" class="app-btn green-btn">Copy WP HTML</button>
                </div>
              </div>

              <textarea id="articleText" class="editor editor-left">Paste your article here...</textarea>
            </div>

            <div class="panel panel-right">
              <div class="panel-title">SEO Output</div>

              <div class="quick-card">
                <div class="quick-title">Quick Copy Sections</div>
                <div class="quick-subtitle">Focus Keyphrase / SEO Title / Meta Description</div>
                <div class="quick-row">
                  <button class="app-btn cyan-btn" data-copy="focus_keyphrase">Focus Keyphrase</button>
                  <button class="app-btn purple-btn" data-copy="seo_title">SEO Title</button>
                  <button class="app-btn yellow-btn" data-copy="meta_description">Meta Description</button>
                </div>
              </div>

              <textarea id="outputText" class="editor editor-right" readonly>Formatted SEO output will appear here.</textarea>

              <div class="hidden-fields" aria-hidden="true">
                <input id="focusKeyphrase" type="text" readonly>
                <input id="seoTitle" type="text" readonly>
                <textarea id="metaDescription" readonly></textarea>
                <input id="slug" type="text" readonly>
                <textarea id="shortSummary" readonly></textarea>
                <textarea id="wordpressHtml" readonly></textarea>
              </div>
            </div>
          </div>
        </section>
      </div>

      <div class="status-bar" id="statusBar">Ready</div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
